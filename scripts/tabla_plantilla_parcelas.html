<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: "NotoSans";
    src: url("fonts/NotoSans-Regular.ttf") format("truetype");
    font-weight: normal;
    font-style: normal;
  }

  .contenedor {
    border: 2px solid #7f2500;
    border-radius: 10px;
    width: 100%;
    box-sizing: border-box;
    overflow: hidden;
    font-family: "NotoSans", Arial, sans-serif;
  }

  .encabezado {
    background-color: #7f2500;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .encabezado .titulo {
    font-size: 18px;
    font-weight: bold;
    color: #FFFFFF;
    letter-spacing: 1px;
  }

  .encabezado .id {
    font-size: 20px;
    font-weight: bold;
    color: #FFFFFF;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    font-family: "NotoSans", Arial, sans-serif;
  }

  th {
    background-color: #a75a01;
    color: #FFFFFF;
    padding: 8px 14px;
    text-align: left;
    width: 40%;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.3px;
  }

  td {
    padding: 8px 14px;
    background-color: #fff8d8;
    color: #7f2500;
    text-align: left;
    font-size: 14px;
  }

  tr:nth-child(even) td {
    background-color: #FFFFFF;
  }

  tr:last-child th {
    border-radius: 0 0 0 8px;
  }

  tr:last-child td {
    border-radius: 0 0 8px 0;
  }
</style>
</head>
<body>

<div class="contenedor">
  <div class="encabezado">
    <span class="titulo">FICHA DE PARCELA</span>
    <span class="id">[% "id_parcela" %]</span>
  </div>
  <table>
    <tr>
      <th>Agricultor</th>
      <td>[%"nombre_agricultor"%]</td>
    </tr>
    <tr>
      <th>Cultivo</th>
      <td>[% "cultivo" %]</td>
    </tr>
    <tr>
      <th>Superficie (ha)</th>
      <td>[% "superficie_ha" %]</td>
    </tr>
    <tr>
      <th>Fecha inicio cultivo</th>
      <td>[% "fecha_inicio_cultivo" %]</td>
    </tr>
    <tr>
      <th>Sector</th>
      <td>[% "sector" %]</td>
    </tr>
    <tr>
      <th>Estado</th>
      <td>[%"estado"%]</td>
    </tr>
    <tr>
      <th>Parcelas asociadas</th>
      <td>[% "parcelas_asociadas" %]</td>
    </tr>
  </table>
</div>

</body>
</html>
